name: Build and Deploy Privacy Hub and Headless CMS

on:
  push:
    branches:
      - '**'
    tags:
      - '*/*/*'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
  permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Needed for version history

      - name: Install Dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y pandoc jq
          pip install mkdocs mkdocs-material

      - name: Build Hub Website with MkDocs
        run: mkdocs build # This creates the ./site directory

      - name: Build Headless notices.json
        run: |
          # The Lua filter script and JSON build logic remains the same
          cat <<'EOF' > add-classes.lua
          function add_class_to_element(element, class_name)
            if element.classes then
              table.insert(element.classes, class_name)
            else
              element.classes = {class_name}
            end
            return element
          end
          return {
            Header = function(el) return add_class_to_element(el, "privacy-h" .. el.level) end,
            Para = function(el) return add_class_to_element(el, "privacy-p") end,
            BulletList = function(el) return add_class_to_element(el, "privacy-ul") end,
            OrderedList = function(el) return add_class_to_element(el, "privacy-ol") end
          }
          EOF
          final_json="{}"
          find notices -type f -name "index.md" | while read -r notice_file; do
            notice_dir=$(dirname $(dirname "$notice_file"))
            notice_slug=$(echo "$notice_dir" | sed 's|^notices/||')
            latest_html=$(pandoc --from markdown --to html --lua-filter=add-classes.lua "$notice_file")
            final_json=$(echo "$final_json" | jq --arg slug "$notice_slug" --argjson html "$(echo "$latest_html" | jq -sR .)" '.[$slug].latest.html = $html')
            tags=$(git tag -l "$notice_slug/v*" | sort -Vr)
            history_json="[]"
            if [ -n "$tags" ]; then
              for tag in $tags; do
                version=$(echo "$tag" | cut -d'/' -f3)
                historical_html=$(git show "$tag:$notice_file" | pandoc --from markdown --to html --lua-filter=add-classes.lua)
                version_obj=$(jq -n --arg ver "$version" --argjson html "$(echo "$historical_html" | jq -sR .)" '{version: $ver, html: $html}')
                history_json=$(echo "$history_json" | jq --argjson obj "$version_obj" '. += [$obj]')
              done
            fi
            final_json=$(echo "$final_json" | jq --arg slug "$notice_slug" --argjson hist "$history_json" '.[$slug].history = $hist')
          done
          # IMPORTANT: Place the final JSON file inside the 'site' directory
          echo "$final_json" > site/notices.json
          echo "notices.json created inside the ./site directory."

      # --- THIS IS THE NEW DEPLOYMENT STEP ---
      - name: Deploy to GitHub Pages Branch
        # This action will take the contents of the 'publish_dir' and push them
        # to the 'gh_pages_branch', creating it if it doesn't exist.
        # It correctly handles symlinks by copying the content.
        if: github.ref != 'refs/heads/main' # Run only on test branches
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          # Optional: you can customize the commit message
          commit_message: "Deploying test build to gh-pages from ${{ github.sha }}"